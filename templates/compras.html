{% extends "base.html" %}
{% block content %}

<header class="page-head">
  <div>
    <h2 class="page-title">🧾 Compras</h2>
  </div>
</header>

<div class="layout-2col">

  <section class="card">
    <div class="card-head">
      <h3>Registrar compra</h3>
    </div>

    <form method="post" id="compraForm" class="form">

      <!-- ===== MODO ===== -->
      <div class="section">
        <div class="toggles">

          <label class="toggle">
            <input type="checkbox" id="esInsumo" name="es_insumo" value="1">
            <span class="toggle-ui"></span>
            <span><strong>Sumar stock</strong></span>
          </label>

          <label class="toggle" id="toggleOtroLabel">
            <input type="checkbox" id="esOtro" name="es_otro" value="1">
            <span class="toggle-ui"></span>
            <span><strong>Otro</strong></span>
          </label>

        </div>
      </div>

      <!-- ===== DATOS ===== -->
      <div class="section">
        <div class="grid">

          <input type="date" name="fecha" required>
          <input type="text" name="lugar" placeholder="Lugar" required>

          <select name="tipo_costo" required>
            <option value="insumos">Insumos</option>
            <option value="operativo">Operativo</option>
            <option value="servicios">Servicios</option>
          </select>

          <input type="number" name="costo" step="0.01" required placeholder="Costo">

        </div>
      </div>

      <!-- ===== TARJETAS INSUMOS ===== -->
      <div class="section">
        <div class="cards" id="insumoCards">

          {% for ins in insumos %}
          <div class="card-option"
               data-id="{{ ins.id }}"
               data-unidad="{{ ins.unidad_base }}"
               data-nombre="{{ ins.nombre }}">
            <strong>{{ ins.nombre }}</strong>
            <span>{{ ins.unidad_base }}</span>
          </div>
          {% endfor %}

          <div class="card-option otro" id="cardOtro">
            <strong>+ Otro</strong>
            <span>No está en la lista</span>
          </div>

        </div>

        <input type="hidden" name="insumo_id" id="insumoSelect">
        <input type="hidden" name="concepto" id="concepto">
      </div>

      <!-- ===== OTRO ===== -->
      <div class="section" id="otroWrap" style="display:none;">
        <input type="text" id="otroTexto" placeholder="Escribe el concepto...">
      </div>

      <!-- ===== TEXTO ===== -->
      <div class="section" id="textoFields">
        <input type="number" name="cantidad" id="cantidadTxt" placeholder="Cantidad">
        <input type="text" name="unidad" id="unidadTxt" placeholder="Unidad">
      </div>

      <!-- ===== STOCK ===== -->
      <div class="section" id="stockPanel" style="display:none;">
        <input type="number" name="cantidad_base" id="cantidadBase" placeholder="Cantidad base">
        <input type="text" name="unidad_base" id="unidadBase" readonly>
        <input type="number" name="costo_unitario" id="costoUnitario" readonly>
      </div>

      <button type="submit">Guardar</button>

    </form>
  </section>

</div>

<style>
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(120px,1fr));
  gap:10px;
}

.card-option{
  border:1px solid #ddd;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  background:#fff;
}

.card-option.active{
  border:2px solid #000;
}

.card-option.otro{
  border-style:dashed;
}
</style>

<script>
function qs(id){ return document.getElementById(id); }

function selectCard(card){
  document.querySelectorAll(".card-option").forEach(c => c.classList.remove("active"));
  card.classList.add("active");

  if(card.id === "cardOtro"){
    qs("esOtro").checked = true;
    qs("insumoSelect").value = "";
    qs("otroWrap").style.display = "block";
    qs("concepto").value = "Otro";
  }else{
    qs("esOtro").checked = false;
    qs("otroWrap").style.display = "none";

    qs("insumoSelect").value = card.dataset.id;
    qs("unidadBase").value = card.dataset.unidad;
    qs("concepto").value = card.dataset.nombre;
  }

  togglePanels();
}

function togglePanels(){
  const stock = qs("esInsumo").checked;
  const hasInsumo = qs("insumoSelect").value;

  qs("stockPanel").style.display = (stock && hasInsumo) ? "block" : "none";
  qs("textoFields").style.display = stock ? "none" : "block";
}

function calcCostoUnitario(){
  const costo = parseFloat(document.querySelector("input[name='costo']").value || 0);
  const cantidad = parseFloat(qs("cantidadBase").value || 0);

  if(cantidad > 0){
    qs("costoUnitario").value = (costo / cantidad).toFixed(4);
  }
}

document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".card-option").forEach(card => {
    card.addEventListener("click", () => selectCard(card));
  });

  qs("esInsumo").addEventListener("change", togglePanels);
  qs("cantidadBase").addEventListener("input", calcCostoUnitario);
  document.querySelector("input[name='costo']").addEventListener("input", calcCostoUnitario);

});
</script>

{% endblock %}
