{% extends "base.html" %}
{% block content %}

<!-- ===== HEADER CON HAMBURGUESA ===== -->
<header class="mobile-header">
  <button id="menuBtn">☰</button>
  <h2>Compras</h2>
</header>

<!-- ===== MENÚ ===== -->
<nav id="mobileMenu" class="mobile-menu">
  <a href="#">Dashboard</a>
  <a href="#">Inventario</a>
  <a href="#">Compras</a>
  <a href="#">Reportes</a>
</nav>

<div class="layout">

  <form method="post" id="compraForm" class="form">

    <!-- MODO -->
    <div class="section toggles">
      <label><input type="checkbox" id="esInsumo" name="es_insumo"> Sumar stock</label>
      <label><input type="checkbox" id="esOtro" name="es_otro"> Otro</label>
    </div>

    <!-- DATOS -->
    <div class="section grid">
      <input type="date" name="fecha" required>
      <input type="text" name="lugar" placeholder="Lugar" required>

      <select name="tipo_costo">
        <option value="insumos">Insumos</option>
        <option value="operativo">Operativo</option>
        <option value="servicios">Servicios</option>
      </select>

      <input type="number" name="costo" placeholder="Costo">
    </div>

    <!-- TARJETAS -->
    <div class="section">
      <div class="cards" id="insumoCards">

        {% for ins in insumos %}
        <div class="card-option"
             data-id="{{ ins.id }}"
             data-unidad="{{ ins.unidad_base }}"
             data-nombre="{{ ins.nombre }}">
          <strong>{{ ins.nombre }}</strong>
          <span>{{ ins.unidad_base }}</span>
        </div>
        {% endfor %}

        <!-- OTRO COMO CARD -->
        <div class="card-option otro" id="cardOtro">
          <strong>+ Otro</strong>
          <span>No está en la lista</span>
        </div>

      </div>

      <input type="hidden" name="insumo_id" id="insumoSelect">
      <input type="hidden" name="concepto" id="concepto">
    </div>

    <!-- OTRO -->
    <div class="section" id="otroWrap" style="display:none;">
      <input type="text" id="otroTexto" placeholder="Escribe el concepto...">
    </div>

    <!-- TEXTO -->
    <div class="section" id="textoFields">
      <input type="number" name="cantidad" id="cantidadTxt" placeholder="Cantidad">
      <input type="text" name="unidad" id="unidadTxt" placeholder="Unidad">
    </div>

    <!-- STOCK -->
    <div class="section" id="stockPanel" style="display:none;">
      <input type="number" name="cantidad_base" id="cantidadBase" placeholder="Cantidad base">
      <input type="text" name="unidad_base" id="unidadBase" readonly>
      <input type="number" name="costo_unitario" id="costoUnitario" readonly>
    </div>

    <!-- BOTÓN FIJO -->
    <button type="submit" class="cta">Guardar compra</button>

  </form>

</div>

<style>

/* HEADER */
.mobile-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background:#fff;
  border-bottom:1px solid #eee;
}

#menuBtn{
  font-size:20px;
  border:none;
  background:none;
}

/* MENÚ */
.mobile-menu{
  position:fixed;
  top:0;
  left:-100%;
  width:70%;
  height:100%;
  background:#fff;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
  transition:.3s;
  z-index:1000;
}

.mobile-menu.active{
  left:0;
}

/* LAYOUT */
.layout{
  padding:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* TARJETAS */
.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

@media(min-width:768px){
  .cards{grid-template-columns:repeat(3,1fr);}
}

.card-option{
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  background:#fff;
  cursor:pointer;
}

.card-option.active{
  border:2px solid #000;
}

.card-option.otro{
  border-style:dashed;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* CTA */
.cta{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:16px;
  background:#000;
  color:#fff;
  font-size:18px;
  border:none;
}

/* SPACING */
.form{
  padding-bottom:90px;
}

.section{
  margin-bottom:12px;
}

</style>

<script>

function qs(id){ return document.getElementById(id); }

/* MENU */
qs("menuBtn").addEventListener("click",()=>{
  qs("mobileMenu").classList.toggle("active");
});

/* CARDS */
function selectCard(card){
  document.querySelectorAll(".card-option").forEach(c=>c.classList.remove("active"));
  card.classList.add("active");

  if(card.id==="cardOtro"){
    qs("esOtro").checked=true;
    qs("otroWrap").style.display="block";
    qs("insumoSelect").value="";
  }else{
    qs("esOtro").checked=false;
    qs("otroWrap").style.display="none";
    qs("insumoSelect").value=card.dataset.id;
    qs("unidadBase").value=card.dataset.unidad;
    qs("concepto").value=card.dataset.nombre;
  }

  togglePanels();
}

function togglePanels(){
  const stock=qs("esInsumo").checked;
  const has=qs("insumoSelect").value;

  qs("stockPanel").style.display=(stock && has)?"block":"none";
  qs("textoFields").style.display=stock?"none":"block";
}

document.querySelectorAll(".card-option").forEach(c=>{
  c.addEventListener("click",()=>selectCard(c));
});

</script>

{% endblock %}
