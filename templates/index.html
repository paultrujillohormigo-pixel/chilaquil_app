<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Señor Chilaquil</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --rojo: #b32417;
      --negro: #010101;
      --rojo-oscuro: #6f150c;
      --blanco: #ffffff;
      --gris-suave: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: var(--blanco);
      color: var(--negro);
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: var(--negro);
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
      transition: 0.2s;
    }

    nav a:hover {
      color: var(--rojo);
    }

    nav img {
      height: 60px;
      object-fit: contain;
    }

    /* HERO */
    .hero {
      height: 90vh;
      background: url('https://res.cloudinary.com/dnzkctdej/image/upload/v1774715379/srchi_pqbzmv.jpg') center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 60px;
      text-align: center;
      color: white;
    }

    .hero-content {
      max-width: 800px;
      background: rgba(0,0,0,0.35);
      padding: 20px 30px;
      border-radius: 10px;
    }

    .hero h2 {
      font-size: 3.2rem;
      font-weight: 800;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 25px;
    }

    .btn {
      background: var(--rojo);
      padding: 15px 30px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: var(--rojo-oscuro);
    }

    /* SECCION PRODUCTOS */
    .section {
      padding: 80px 40px;
      text-align: center;
      background: var(--blanco);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: contain;
    }

    .card h4 {
      margin-top: 10px;
      font-weight: 700;
      color: var(--negro);
    }

    /* PROMO */
    .promo {
      background-image: url('https://res.cloudinary.com/dnzkctdej/image/upload/v1774716563/COMBO_GALLETA_AGUA_CHIL_cez0yn.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      aspect-ratio: 16 / 9;
      width: 100%;
      background-color: white;
    }

    /* FOOTER */
    footer {
      background: var(--negro);
      color: white;
      text-align: center;
      padding: 30px;
    }

  </style>
</head>

<body>

  <nav>
    <img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774407839/logo_m0f0gu.png">
    <div>
      <a href="www.senorchilaquil.com/menu">Menú</a>
      <a href="#promo">Promos</a>
      <a href="www.senorchilaquil.com/menu">Ordenar</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h2>LOS CHILAQUILES MÁS CABRONES DE AGUASCALIENTES</h2>
      <p>Rápido, delicioso y directo hasta tu puerta</p>
      <a href="https://wa.me/524497419166" class="btn">Ordenar ahora</a>
    </div>
  </section>

  <section id="menu" class="section">
    <div class="cards">

      <div class="card">
        <img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774718423/senor_chilaquil_imagen_qp2xk4.png">
        <h4>Delivery (Pa` llevar)</h4>
      </div>

      <div class="card">
        <img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774718973/ChatGPT_Image_28_mar_2026_11_29_14_a.m._prfa1y.png">
        <h4>Chilaquiles</h4>
      </div>

      <div class="card">
        <img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774724809/ChatGPT_Image_28_mar_2026_01_06_23_p.m._bmdow4.png">
        <h4>Paquetes / Promos</h4>
      </div>

    </div>
  </section>

  <section id="promo" class="promo"></section>

  <footer>
    <p>© 2026 Señor Chilaquil - Todos los derechos reservados</p>
  </footer>

</body>
</html>
