<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Señor Chilaquil - Sistema Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* ================= ESTILOS BASE ================= */
    body { margin: 0; font-family: 'Montserrat', sans-serif; background: #f4f6f8; padding-bottom: 80px; }
    :root { --rojo: #b32417; --negro: #010101; }

    .navbar, nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 20px; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      position: sticky; top: 0; z-index: 1000;
    }
    nav img { height: 50px; object-fit: contain; }
    nav div { display: flex; gap: 15px; }
    nav a { color: var(--negro); text-decoration: none; font-weight: 600; font-size: 14px; }

    .menu-wrapper { padding:20px; max-width: 800px; margin: 0 auto; }
    .category-title { font-size: 22px; color: var(--rojo); margin: 30px 0 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
    
    .cards { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
    .card { cursor:pointer; text-align:center; background: #fff; border-radius: 12px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: 0.2s; }
    .card:active { transform: scale(0.96); }
    .img-box { height:100px; display:flex; align-items:center; justify-content:center; margin-bottom: 10px; }
    .img-box img { max-width:100%; max-height:100%; object-fit: contain; }
    .price-tag { display: block; font-weight: 600; color: var(--rojo); margin-top: 5px; }

    /* MODAL */
    #menu-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index:2000; }
    .modal-content { background:white; padding:20px; border-radius:10px; width:90%; max-width:400px; max-height:90vh; overflow:auto; }
    .option { display:flex; align-items:center; gap:10px; margin:8px 0; font-size:14px; }

    /* CARRITO */
    #cart-tab { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--rojo); color: white; padding: 14px; border-radius: 40px; font-weight: 700; width: 90%; max-width: 400px; text-align: center; z-index: 1500; box-shadow: 0 4px 15px rgba(179, 36, 23, 0.4); }
    #cart-panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); padding: 20px; transition: 0.3s; z-index: 2100; overflow-y: auto; }
    #cart-panel.open { bottom:0; }
    .menu-btn { background:var(--rojo); color:white; border:none; padding:12px; margin-top:10px; width:100%; border-radius: 8px; font-weight: 600; cursor:pointer; }
    .menu-input { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #ddd; font-family: 'Montserrat', sans-serif; }
    .remove-btn { background:#eee; border:none; padding:5px 8px; border-radius:5px; cursor:pointer; }
    
    .promo-alert { background: #fff3e0; color: #e65100; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: 600; text-align: center; border: 1px solid #ffe0b2; }
  </style>
</head>
<body>

<nav>
  <img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774407839/logo_m0f0gu.png">
  <div>
    <a href="#">Menú</a>
    <a href="#">Promos</a>
  </div>
</nav>

<section class="menu-wrapper">
  <div id="day-promo-msg"></div> <h2 class="category-title">🍽️ Platillos</h2>
  <div class="cards">
    <div class="card" onclick="openProduct(this)" data-name="Chilaquiles" data-price="120">
      <div class="img-box"><img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774718973/ChatGPT_Image_28_mar_2026_11_29_14_a.m._prfa1y.png"></div>
      <h4>Chilaquiles</h4><span class="price-tag">$120</span>
    </div>
    <div class="card" onclick="openProduct(this)" data-name="Torta de Chilaquiles" data-price="75">
      <div class="img-box"><img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774793308/ChatGPT_Image_29_mar_2026_08_08_06_a.m._qxis4h.png"></div>
      <h4>Torta de Chilaquiles</h4><span class="price-tag">$75</span>
    </div>
    </div>

  <h2 class="category-title">☕ Bebidas</h2>
  <div class="cards">
    <div class="card" onclick="addSimpleProduct(this)" data-name="Cafe Americano" data-price="40"><div class="img-box"><span style="font-size:40px">☕</span></div><h4>Cafe Americano</h4><span class="price-tag">$40</span></div>
    <div class="card" onclick="addSimpleProduct(this)" data-name="Coca Cola" data-price="35"><div class="img-box"><span style="font-size:40px">🥤</span></div><h4>Coca Cola</h4><span class="price-tag">$35</span></div>
  </div>
</section>

<div id="cart-tab" onclick="toggleCart()">
  🧾 Ver pedido (<span id="cart-count">0</span>) | Total: $<span id="total">0</span>
</div>

<div id="cart-panel">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h3>Tu pedido</h3>
    <button onclick="toggleCart(true)" class="remove-btn">Cerrar ✕</button>
  </div>
  <div id="cart-items" style="margin-top: 15px;"></div>
  <div id="promo-discount-msg" style="color: green; font-weight: bold; font-size: 14px; margin-top: 10px;"></div>
  <hr style="margin: 15px 0;">
  
  <input id="nombre" class="menu-input" placeholder="Nombre del cliente">
  <div style="display:flex; gap:10px; margin-top:10px;">
    <label><input type="radio" name="tipo" value="En el lugar" checked> Local</label>
    <label><input type="radio" name="tipo" value="Domicilio"> Domicilio</label>
  </div>
  <button onclick="generarPedido()" class="menu-btn">ENVIAR WHATSAPP</button>
</div>

<script>
  let cart = [];
  const salsas = ["Verde", "Habanero", "Chipotle", "Cacahuate"];
  const proteinas = ["Pollo", "Huevo", "Chicharrón", "Arrachera"];

  // Función para saber si es miércoles
  function esMiercoles() {
    return new Date().getDay() === 3; // 0=Dom, 1=Lun, 2=Mar, 3=Mie...
  }

  // Mostrar mensaje de promo si es miércoles
  if(esMiercoles()){
    document.getElementById('day-promo-msg').innerHTML = `<div class="promo-alert">🔥 ¡HOY ES MIÉRCOLES DE 2X1 EN CHILAQUILES! 🔥</div>`;
  }

  function openProduct(el) {
    let modal = document.createElement("div");
    modal.id = "menu-modal";
    modal.innerHTML = `
      <div class="modal-content">
        <h3 style="color:var(--rojo);">${el.dataset.name}</h3>
        <p>Selecciona tus opciones:</p>
        <br><b>Salsas</b>
        ${salsas.map(s => `<label class="option"><input type="checkbox" class="salsa" value="${s}"><span>${s}</span></label>`).join("")}
        <br><b>Proteína</b>
        <select id="proteina" class="menu-input">
          <option>Sin proteína</option>
          ${proteinas.map(p => `<option value="${p}">${p}</option>`).join("")}
        </select>
        <button class="menu-btn" onclick="addCustomProduct('${el.dataset.name}', ${el.dataset.price})">Agregar - $${el.dataset.price}</button>
        <button class="menu-btn" style="background:#444;" onclick="closeModal()">Cancelar</button>
      </div>`;
    document.body.appendChild(modal);
  }

  function closeModal() { document.getElementById("menu-modal").remove(); }

  function addCustomProduct(name, price) {
    let s = [...document.querySelectorAll(".salsa:checked")].map(e => e.value);
    let p = document.getElementById("proteina").value;
    cart.push({ name, s, p, price: parseInt(price) });
    closeModal();
    updateCartUI();
  }

  function addSimpleProduct(el) {
    cart.push({ name: el.dataset.name, price: parseInt(el.dataset.price) });
    updateCartUI();
  }

  function toggleCart(forceClose = false) {
    let panel = document.getElementById("cart-panel");
    forceClose ? panel.classList.remove("open") : panel.classList.toggle("open");
  }

  // LÓGICA DEL TOTAL CON 2X1
  function calculateTotal() {
    let subtotal = cart.reduce((sum, i) => sum + i.price, 0);
    let descuento = 0;

    if (esMiercoles()) {
      // Contamos cuántos productos llamados exactamente "Chilaquiles" hay
      let numChilaquiles = cart.filter(item => item.name === "Chilaquiles").length;
      
      // Por cada par (2), descontamos el precio de uno ($120)
      if (numChilaquiles >= 2) {
        let pares = Math.floor(numChilaquiles / 2);
        descuento = pares * 120;
      }
    }

    return { total: subtotal - descuento, descuento: descuento };
  }

  function updateCartUI() {
    let c = document.getElementById("cart-items");
    let { total, descuento } = calculateTotal();
    
    document.getElementById("cart-count").innerText = cart.length;
    document.getElementById("total").innerText = total;
    c.innerHTML = "";

    cart.forEach((i, index) => {
      let div = document.createElement("div");
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
          <span><b>${i.name}</b></span>
          <span>$${i.price} <button class="remove-btn" onclick="removeItem(${index})">✕</button></span>
        </div>`;
      c.appendChild(div);
    });

    // Mostrar aviso de descuento en el carrito
    let msgD = document.getElementById("promo-discount-msg");
    msgD.innerText = descuento > 0 ? `¡Descuento 2x1 aplicado: -$${descuento}!` : "";
  }

  function removeItem(i) {
    cart.splice(i, 1);
    updateCartUI();
  }

  function generarPedido() {
    if (cart.length === 0) return alert("Carrito vacío");
    let nombre = document.getElementById("nombre").value || "Cliente";
    let { total, descuento } = calculateTotal();
    
    let msg = `*Pedido Señor Chilaquil*%0A`;
    cart.forEach(i => msg += `- ${i.name} ($${i.price})%0A`);
    if(descuento > 0) msg += `%0A🎁 *PROMO 2X1 MIÉRCOLES:* -$${descuento}%0A`;
    msg += `%0A*TOTAL A PAGAR: $${total}*%0A*Cliente:* ${nombre}`;

    window.open(`https://wa.me/524491971799?text=${msg}`);
  }
</script>

</body>
</html>
