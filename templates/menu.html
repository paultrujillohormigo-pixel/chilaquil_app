<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú | Señor Chilaquil</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root { --rojo:#b32417; }

* { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat', sans-serif;}

body { background:#fff; }

/* GRID */
.section { padding:20px; }

.cards {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.card { cursor:pointer; text-align:center; }

.img-box {
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.img-box img {
  max-width:100%;
  max-height:100%;
}

/* MODAL */
#modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:500;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
  max-height:90vh;
  overflow:auto;
}

/* FIX CHECKBOX */
.option {
  display:flex;
  align-items:flex-start;
  gap:8px;
  margin:6px 0;
  font-size:14px;
}

.option span {
  flex:1;
  word-break: break-word;
}

/* CART */
#cart-tab {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #b32417;
  color: white;
  padding: 14px;
  border-radius: 40px;
  font-weight: 700;
  width: 90%;
  text-align: center;
}

#cart-panel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 85%;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  transition: 0.3s;
  overflow-y: auto;
}

#cart-panel.open { bottom:0; }

.remove-btn {
  background:#ddd;
  padding:3px 6px;
  font-size:12px;
  border-radius:5px;
}

/* INPUTS */
input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<section class="section">
<div class="cards">

<div class="card" onclick="openProduct(this)" data-name="Chilaquiles" data-price="120">
<div class="img-box"><img src="https://res.cloudinary.com/dnzkctdej/image/upload/v1774718973/ChatGPT_Image_28_mar_2026_11_29_14_a.m._prfa1y.png"></div>
<h4>Chilaquiles</h4>
</div>

</div>
</section>

<div id="cart-tab" onclick="toggleCart()">
🧾 Ver pedido (<span id="cart-count">0</span>) | Total: $<span id="total">0</span>
</div>

<div id="cart-panel">

<div style="display:flex; justify-content:space-between;">
<h3>Tu pedido</h3>
<button onclick="toggleCart(true)">✕</button>
</div>

<div id="cart-items"></div>

<hr>

<label><input type="radio" name="tipo" value="En el lugar"> En el lugar</label>
<label><input type="radio" name="tipo" value="Recoger"> Recoger</label>
<label><input type="radio" name="tipo" value="Domicilio" onclick="showDir()"> Domicilio</label>

<div id="dir" style="display:none;">
<input id="direccion" placeholder="Dirección">
</div>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<select id="pago">
<option>Efectivo</option>
<option>Transferencia</option>
</select>

<button onclick="generarPedido()">PEDIR</button>

</div>

<script>
let cart=[]

const salsas=["Verde","Habanero","Habanero Miel","Chipotle","Cacahuate"]
const proteinas=["Pollo","Huevo","Chicharrón","Arrachera"]
const extrasBase=["Aguacate","Queso","Nopal"]
const removibles=["Crema","Queso","Cebolla","Aguacate"]

function openProduct(el){
let modal=document.createElement("div")
modal.id="modal"

modal.innerHTML=`
<div class="modal-content">
<h3>${el.dataset.name}</h3>

<b>Salsas (máx 2)</b>
${salsas.map(s=>`
<label class="option">
<input type="checkbox" class="salsa" value="${s}">
<span>${s}</span>
</label>`).join("")}

<b>Proteína</b>
<select id="proteina">
${proteinas.map(p=>`<option>${p}</option>`).join("")}
</select>

<b>Extras +20</b>
${[...extrasBase,...proteinas,...salsas].map(e=>`
<label class="option">
<input type="checkbox" class="extra" value="${e}">
<span>${e}</span>
</label>`).join("")}

<b>Quitar ingredientes</b>
${removibles.map(r=>`
<label class="option">
<input type="checkbox" class="remove" value="${r}">
<span>Sin ${r}</span>
</label>`).join("")}

<button onclick="addCustomProduct('${el.dataset.name}', ${el.dataset.price})">Agregar</button>
<button onclick="closeModal()">Cerrar</button>
</div>`

document.body.appendChild(modal)

modal.addEventListener("click",(e)=>{
if(e.target.id==="modal") closeModal()
})
}

function closeModal(){ document.getElementById("modal").remove() }

function addCustomProduct(name,price){
let s=[...document.querySelectorAll(".salsa:checked")].map(e=>e.value)
if(s.length>2){alert("Máx 2 salsas");return}

let p=document.getElementById("proteina").value
let e=[...document.querySelectorAll(".extra:checked")].map(x=>x.value)
let r=[...document.querySelectorAll(".remove:checked")].map(x=>x.value)

cart.push({name,s,p,e,r,price:price+e.length*20})
closeModal()
updateCartUI()
toggleCart()
}

function toggleCart(force=false){
let panel=document.getElementById("cart-panel")
if(force) panel.classList.remove("open")
else panel.classList.toggle("open")
}

function showDir(){
document.getElementById("dir").style.display="block"
}

function calculateTotal(){
return cart.reduce((sum,i)=>sum+i.price,0)
}

function updateCartUI(){
let c=document.getElementById("cart-items")
let count=document.getElementById("cart-count")
let total=document.getElementById("total")

c.innerHTML=""
count.innerText=cart.length
total.innerText=calculateTotal()

cart.forEach((i,index)=>{
c.innerHTML+=`
<b>${i.name}</b> - $${i.price}
<button class="remove-btn" onclick="removeItem(${index})">✕</button><br>
${i.s.length ? "Salsas: "+i.s.join(", ")+"<br>" : ""}
${i.p ? "Proteína: "+i.p+"<br>" : ""}
${i.e.length ? "Extras: "+i.e.join(", ")+"<br>" : ""}
${i.r.length ? "Sin: "+i.r.join(", ")+"<br>" : ""}
<hr>`
})
}

function removeItem(i){
cart.splice(i,1)
updateCartUI()
}

function generarPedido(){
let tipo=document.querySelector('input[name="tipo"]:checked')
if(!tipo)return alert("Selecciona tipo")

let msg="Pedido:%0A%0A"

cart.forEach(i=>{
msg+=`- ${i.name}%0A`
if(i.s.length) msg+=`  Salsas: ${i.s.join(", ")}%0A`
if(i.p) msg+=`  Proteína: ${i.p}%0A`
if(i.e.length) msg+=`  Extras: ${i.e.join(", ")}%0A`
if(i.r.length) msg+=`  Sin: ${i.r.join(", ")}%0A`
msg+=`  $${i.price}%0A%0A`
})

msg+=`Total: $${calculateTotal()}%0A`

window.open(`https://wa.me/524491971799?text=${msg}`)
}
</script>

</body>
</html>
